apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: release
spec:
  pipelineSpec:
    tasks:
    - name: from-build-pack
      resources: {}
      taskSpec:
        metadata: {}
        stepTemplate:
          image: uses:mikelear/leartech-pipeline-catalog/tasks/go/release.yaml@main
          name: ""
          resources:
            limits: {}
          workingDir: /workspace/source
        steps:
        - image: uses:jenkins-x/jx3-pipeline-catalog/tasks/git-clone/git-clone.yaml@versionStream
          name: ""
          resources: {}
        - name: next-version
          resources: {}
        - name: jx-variables
          resources: {}
        - image: golang:1.26
          name: build-make-build
          resources: {}
          script: |
            #!/bin/bash
            source .jx/variables.sh
            make build-pkgs
        - name: promote-changelog
          resources: {}
        - image: uses:spring-financial-group/mqube-pipeline-catalog/tasks/go/sonar-scanner-go-release.yaml@main
          name: ""
          resources: {}
  podTemplate: {}
  serviceAccountName: tekton-bot
  timeout: 1h0m0s
status: {}
